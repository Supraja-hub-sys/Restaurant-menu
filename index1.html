<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Hub</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#111;
    color:#fff;
}

header{
    background:#ff6600;
    text-align:center;
    padding:20px;
}

nav{
    background:#222;
    padding:15px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:20px;
    font-size:18px;
}

.search{
    text-align:center;
    margin:20px;
}

.search input{
    width:60%;
    padding:12px;
    border:none;
    border-radius:25px;
}

h2{
    color:orange;
    text-align:center;
    margin:20px;
}

.container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:25px;
    padding:20px;
}

.card{
    background:#222;
    width:350px;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

.card iframe{
    width:100%;
    height:220px;
    border:none;
    border-radius:10px;
}

audio{
    width:100%;
    margin-top:10px;
}

footer{
    background:#222;
    text-align:center;
    padding:20px;
    margin-top:30px;
}
</style>

</head>

<body>

<header>
<h1>🎵 Music Hub</h1>
<p>Latest Telugu Songs & Trailers</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Movies</a>
<a href="#">Songs</a>
<a href="#">Albums</a>
<a href="#">Contact</a>
</nav>

<div class="search">
<input type="text" placeholder="Search your favorite songs...">
</div>

<h2>Latest Movies</h2>

<div class="container">

<div class="card">

src="https://www.youtube.com/embed/8mAITcNt710"
allowfullscreen>

</audio>

</div>

</audio>

</div>

</div>

<footer>
<p>© 2026 Music Hub | Multimedia HTML Project</p>
</footer>

</body>
</html>
